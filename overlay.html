<!DOCTYPE html>
<html>
<body style="margin:0;background:transparent;overflow:hidden;font-family:sans-serif;">

<div id="alert" style="
position:absolute;
top:50%; left:50%;
transform:translate(-50%,-50%) scale(0.8);
text-align:center;
opacity:0;
transition: all 0.4s ease;
">

<img id="gif" style="width:300px;"><br>

<div id="text" style="
font-size:40px;
font-weight:bold;
text-shadow: 0 0 20px black;
"></div>

</div>

<audio id="sound"></audio>

<script>
let last = "";

async function load() {
    const res = await fetch("/data");
    const data = await res.json();

    if (!data.player) return;

    const id = JSON.stringify(data);
    if (id === last) return;
    last = id;

    const box = document.getElementById("alert");

    document.getElementById("gif").src = data.gif;
    document.getElementById("text").innerText =
        `${data.player} donated ${data.price} PLN!`;

    document.getElementById("text").style.color = data.color;

    if (data.sound) {
        const audio = document.getElementById("sound");
        audio.src = data.sound;
        audio.play();
    }

    box.style.opacity = "1";
    box.style.transform = "translate(-50%,-50%) scale(1)";

    setTimeout(() => {
        box.style.opacity = "0";
        box.style.transform = "translate(-50%,-50%) scale(0.8)";
    }, 6000);
}

setInterval(load, 1000);
</script>

</body>
</html>
