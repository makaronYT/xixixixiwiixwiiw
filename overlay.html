<!DOCTYPE html>
<html>
<body style="
margin:0;
background:transparent;
overflow:hidden;
font-family:sans-serif;
">

<div id="alert" style="
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0.8);
opacity:0;
transition:all .4s ease;
text-align:center;
">

<img id="gif" style="width:300px"><br>

<div id="text" style="
font-size:42px;
font-weight:bold;
text-shadow:0 0 20px black;
"></div>

</div>

<script>

let lastId = null;

async function playTTS(text) {

    return new Promise((resolve) => {

        const utter =
            new SpeechSynthesisUtterance(text);

        utter.onend = () => resolve();

        speechSynthesis.speak(utter);

    });
}

async function playSound(url) {

    return new Promise((resolve) => {

        if (!url)
            return resolve();

        const audio = new Audio(url);

        audio.volume = 1;

        audio.onended = () => resolve();

        audio.onerror = () => resolve();

        audio.play()
            .catch(() => resolve());

    });
}

async function load() {

    const res =
        await fetch("/data");

    const data =
        await res.json();

    if (!data.id)
        return;

    if (data.id === lastId)
        return;

    lastId = data.id;

    document.getElementById("gif").src =
        data.gif;

    const text =
        `${data.player} donated ${data.price} PLN`;

    const textEl =
        document.getElementById("text");

    textEl.innerText = text;

    textEl.style.color =
        data.color;

    const box =
        document.getElementById("alert");

    box.style.opacity = "1";

    box.style.transform =
        "translate(-50%,-50%) scale(1)";

    // SOUND FIRST
    await playSound(data.sound);

    // THEN TTS
    if (data.tts) {
        await playTTS(text);
    }

    setTimeout(() => {

        box.style.opacity = "0";

        box.style.transform =
            "translate(-50%,-50%) scale(0.8)";

    }, data.duration || 5000);
}

setInterval(load, 1000);

</script>

</body>
</html>
